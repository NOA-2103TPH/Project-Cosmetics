services:
    # Nginx service
    nginx:
        image: nginx:alpine
        container_name: laravel_nginx
        ports:
            - "8001:80"
        volumes:
            - .:/var/www/html
            - ./docker/ngnix/nginx.conf:/etc/nginx/nginx.conf
            - ./docker/ngnix/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php
        networks:
            - app_network

    # PHP-FPM service
    php:
        build: .
        container_name: laravel_app
        volumes:
            - .:/var/www/html
            - ./docker/php/php.ini:/usr/local/etc/php/php.ini
            - ./docker/php/php-fpm.conf:/usr/local/etc/php-fpm.d/www.conf
        environment:
            - LANG=en_US.UTF-8
            - LC_ALL=en_US.UTF-8
            - LANGUAGE=en_US:en
            - DB_HOST=mysql
            - DB_PORT=3306
            - DB_DATABASE=laravel
            - DB_USERNAME=laravel
            - DB_PASSWORD=secret
        depends_on:
            - mysql
        networks:
            - app_network

    # MySQL service
    mysql:
        image: mysql:8.0
        container_name: laravel_mysql
        ports:
            - "3306:3306"
        environment:
            - MYSQL_ROOT_PASSWORD=secret
            - MYSQL_DATABASE=laravel
            - MYSQL_USER=laravel
            - MYSQL_PASSWORD=secret
        volumes:
            - mysql_data:/var/lib/mysql
            - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
        networks:
            - app_network

    # phpMyAdmin service
    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        container_name: laravel_phpmyadmin
        ports:
            - "8080:80"
        environment:
            - PMA_HOST=mysql
            - PMA_USER=laravel
            - PMA_PASSWORD=secret
        depends_on:
            - mysql
        networks:
            - app_network

    # Redis service (optional)
    redis:
        image: redis:7-alpine
        container_name: laravel_redis
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        networks:
            - app_network

volumes:
    mysql_data:
    redis_data:

networks:
    app_network:
        driver: bridge
